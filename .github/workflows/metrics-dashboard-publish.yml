name: Metrics Dashboard Publish

on:
  push:
    branches:
      - main
    paths:
      - scripts/metrics-dashboard.js
      - scripts/metrics-report.js
      - docs/metrics-evaluation.md
      - package.json
      - outputs/events/metrics-samples.jsonl
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "metrics-dashboard-pages"
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate metrics dashboard
        run: npm run metrics:dashboard -- --days 30 --top 15

      - name: Prepare pages artifact
        run: |
          mkdir -p site
          cp outputs/reports/metrics-dashboard.html site/index.html

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Add summary
        run: |
          echo "## Metrics Dashboard Published" >> "$GITHUB_STEP_SUMMARY"
          echo "- URL: ${{ steps.deployment.outputs.page_url }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Source: outputs/reports/metrics-dashboard.html" >> "$GITHUB_STEP_SUMMARY"

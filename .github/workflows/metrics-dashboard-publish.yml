name: Metrics Dashboard Publish

on:
  push:
    branches:
      - main
    paths:
      - scripts/metrics-dashboard.js
      - scripts/metrics-report.js
      - scripts/metrics-snapshot.js
      - docs/metrics-evaluation.md
      - docs/metrics-snapshot.json
      - package.json
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:
    inputs:
      fail_on_alert:
        description: "Fail workflow when SLA alerts are detected"
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "metrics-dashboard-pages"
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      METRICS_FAIL_ON_ALERT: ${{ (github.event_name == 'workflow_dispatch' && inputs.fail_on_alert) || vars.METRICS_FAIL_ON_ALERT || 'false' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate metrics snapshot exists
        run: |
          if [ ! -s docs/metrics-snapshot.json ]; then
            echo "::error title=Metrics snapshot missing::docs/metrics-snapshot.json is missing or empty."
            exit 1
          fi

      - name: Generate metrics dashboard
        run: |
          EXTRA_ARGS=""
          if [ "${METRICS_FAIL_ON_ALERT}" = "true" ]; then
            EXTRA_ARGS="--fail-on-alert"
          fi
          npm run metrics:dashboard -- --snapshot docs/metrics-snapshot.json --max-p95-ms 200 --max-error-rate 5 --min-governance-rate 98 ${EXTRA_ARGS}

      - name: Prepare pages artifact
        run: |
          mkdir -p site
          cp outputs/reports/metrics-dashboard.html site/index.html

      - name: Publish SLA alert summary
        run: |
          if [ -f outputs/reports/metrics-alerts.md ]; then
            echo "## Metrics SLA Alerts" >> "$GITHUB_STEP_SUMMARY"
            cat outputs/reports/metrics-alerts.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "## Metrics SLA Alerts" >> "$GITHUB_STEP_SUMMARY"
            echo "- metrics-alerts.md not found" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Add summary
        run: |
          echo "## Metrics Dashboard Published" >> "$GITHUB_STEP_SUMMARY"
          echo "- URL: ${{ steps.deployment.outputs.page_url }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Source: outputs/reports/metrics-dashboard.html" >> "$GITHUB_STEP_SUMMARY"
          echo "- Metrics input: docs/metrics-snapshot.json (committed snapshot)" >> "$GITHUB_STEP_SUMMARY"
          echo "- Fail on alert mode: ${METRICS_FAIL_ON_ALERT}" >> "$GITHUB_STEP_SUMMARY"

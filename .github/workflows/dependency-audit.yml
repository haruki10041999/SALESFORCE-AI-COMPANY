name: Dependency Vulnerability Audit

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "0 2 * * 1"
  workflow_dispatch:

jobs:
  npm-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit (JSON)
        run: npm audit --audit-level=moderate --json > npm-audit-report.json

      - name: Summarize audit result
        run: |
          node -e "const fs=require('fs');const r=JSON.parse(fs.readFileSync('npm-audit-report.json','utf8'));const v=r.metadata?.vulnerabilities||{};const total=(v.low||0)+(v.moderate||0)+(v.high||0)+(v.critical||0);const lines=['## npm audit summary',`- low: ${v.low||0}`,`- moderate: ${v.moderate||0}`,`- high: ${v.high||0}`,`- critical: ${v.critical||0}`,`- total: ${total}`];fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY,lines.join('\n')+'\n');if((v.moderate||0)+(v.high||0)+(v.critical||0)>0){process.exit(1);}"

      - name: Upload audit artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-report
          path: npm-audit-report.json
          if-no-files-found: error

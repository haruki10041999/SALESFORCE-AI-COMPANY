name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Selective test run
        run: npm run test:selective -- --base origin/main --head HEAD

      - name: Tool test matrix
        run: npm run test:matrix -- --fail-on-missing

      - name: Generate tool manifest
        run: npm run docs:manifest

      - name: Check tool compatibility
        run: npm run tools:compat -- --baseline-ref origin/main --fail-on-breaking

      - name: Verify tool manifest integrity
        run: |
          if ! node -e "JSON.parse(require('fs').readFileSync('docs/internal/tool-manifest.json', 'utf-8'))" 2>/dev/null; then
            echo "❌ tool-manifest.json is invalid JSON"
            exit 1
          fi
          echo "✅ tool-manifest.json integrity verified"

      - name: Run benchmark suite
        run: npm run benchmark:run -- --limit 200

      - name: Verify benchmark output
        run: |
          if [ ! -f "outputs/reports/benchmark-suite.json" ]; then
            echo "❌ benchmark-suite.json not found"
            exit 1
          fi
          echo "✅ benchmark-suite.json generated"

      - name: Dependency audit
        run: npm run audit:deps
